<!doctype html>
<html><head><meta charset="utf-8" /><style>body{font-family:Arial,sans-serif;background:transparent}#panel{display:none;width:360px;margin:10vh auto;background:rgba(20,20,20,.95);color:#fff;padding:16px;border-radius:8px}label{display:block;margin-top:8px;margin-bottom:4px;font-size:14px}input,select{width:100%;padding:8px;border-radius:4px;border:1px solid #666;background:#1f1f1f;color:#fff}.row{display:flex;gap:8px;margin-top:12px}button{flex:1;padding:8px;border:0;border-radius:4px;cursor:pointer}.save{background:#2e7d32;color:#fff}.cancel{background:#666;color:#fff}</style></head><body><div id="panel"><h3>Set Accent</h3><label for="accentColor">Accent text color</label><select id="accentColor"><option value="255,255,255">White</option><option value="255,215,0">Gold</option><option value="173,216,230">Light Blue</option><option value="144,238,144">Light Green</option><option value="255,182,193">Light Pink</option><option value="255,140,0">Orange</option></select><label for="accentText">Accent description</label><input id="accentText" maxlength="80" placeholder='Briefly describe your accent here, ie. Thick Midwestern' /><div class="row"><button class="save" id="saveBtn">Save</button><button class="cancel" id="cancelBtn">Cancel</button></div></div><script>const panel=document.getElementById('panel');const accentText=document.getElementById('accentText');const accentColor=document.getElementById('accentColor');window.addEventListener('message',(event)=>{if(event.data.action==='openAccentUI'){panel.style.display='block';accentText.value=event.data.accentText||'';accentColor.value=event.data.accentColor||'255,255,255';accentText.focus();}});async function post(endpoint,data){await fetch(`https://${GetParentResourceName()}/${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data||{})});}document.getElementById('saveBtn').onclick=async()=>{await post('saveAccent',{accentText:accentText.value,accentColor:accentColor.value});panel.style.display='none';};document.getElementById('cancelBtn').onclick=async()=>{await post('cancelAccent',{});panel.style.display='none';};document.addEventListener('keydown',async(e)=>{if(e.key==='Escape'){await post('cancelAccent',{});panel.style.display='none';}});</script></body></html>
