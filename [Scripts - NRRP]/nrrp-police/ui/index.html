<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Police Jail Form</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="panel" class="hidden">
        <button id="xCancel" type="button"></button>

        <div class="divider"></div>

        <div class="form-grid">

            <input id="target" type="text" placeholder="Enter ID or Name..." />

            <select id="location">
                <option>placeholder</option>
                <option>placeholder</option>
                <option>placeholder</option>
            </select>

            <div class="slider-wrap">
                <div class="duration-readout">
                    <span id="durationLabel">30m</span>
                </div>
                <input id="duration" type="range" min="0" max="73" value="0" />
            </div>

            <textarea id="reason" rows="4" maxlength="200" placeholder="Enter reason..."></textarea>
        </div>

        <div class="row">
            <button id="cancel">Cancel</button>
            <button id="submit" class="primary">Submit Booking</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
