<html>

<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="css/app.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
	<div id="menus"></div>
    <script src="https://kit.fontawesome.com/eb73bbb7e4.js" crossorigin="anonymous"></script>
	<script src="nui://game/ui/jquery.js" type="text/javascript"></script>
	<script src="js/mustache.min.js" type="text/javascript"></script>
	<script src="js/app.js" type="text/javascript"></script>
	<script src="app.js"></script>
    <script src="app_debug_addon.js"></script>

    <!-- AK Confirm Modal -->
    <div id="sirevlc-confirm" class="sirevlc-hidden">
      <div class="sirevlc-backdrop"></div>
      <div class="sirevlc-modal menu_header_1a">
        <div class="sirevlc-text" id="sirevlc-confirm-text">Are you sure want to discard all your changes ?</div>
        <div class="sirevlc-actions">
          <button id="sirevlc-confirm-yes" class="sirevlc-btn sirevlc-yes">Yes</button>
          <button id="sirevlc-confirm-no"  class="sirevlc-btn sirevlc-no">No</button>
        </div>
      </div>
    </div>
    

    <!-- SIREVLC Tame Slider (minigame HUD) -->
    <div id="sirevlc-tame-slider" class="sirevlc-tame-hidden" aria-hidden="true">
      <div class="sirevlc-tame-track">
        <div class="sirevlc-tame-tol-area"></div>
        <div class="sirevlc-tame-tol sirevlc-tame-tol-min"></div>
        <div class="sirevlc-tame-tol sirevlc-tame-tol-max"></div>
        <div class="sirevlc-tame-ball"></div>
      </div>
    </div>

    <!-- SIREVLC Rope Slider (lunging hardcore HUD) -->
    <div id="sirevlc-rope-slider" class="sirevlc-rope-hidden" aria-hidden="true">
      <div class="sirevlc-rope-track">
        <div class="sirevlc-rope-tol-area"></div>
        <div class="sirevlc-rope-tol-start"></div>
        <div class="sirevlc-rope-horse"></div>
        <div class="sirevlc-rope-ball"></div>
      </div>
    </div>

    <!-- SIRE_MENU HUD_INFO (top-left info box) -->
    <div id="sire-hud-info" class="sire-hud-info sire-hud-info-hidden" aria-hidden="true">
      <div class="sire-hud-info-header">
        <div class="sire-hud-info-title" id="sire-hud-info-title"></div>
      </div>
      <div class="sire-hud-info-rows" id="sire-hud-info-rows"></div>
    </div>

</body>

</html>
