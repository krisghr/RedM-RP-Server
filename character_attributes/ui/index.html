<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="hidden">
    <div class="panel">
      <div class="header" id="nameTitle">Character</div>
      <div class="content">
        <div class="imageCol">
          <img id="charImage" alt="Character image" />
        </div>
        <div class="rightCol">
          <div class="ageLine">Age: <span id="ageLabel">-</span></div>
          <div id="descView" class="desc"></div>
          <form id="setForm" class="hidden">
            <label>Name<input id="characterName" type="text" maxlength="120" required /></label>
            <label>Age<input id="age" type="number" min="1" max="120" required /></label>
            <label>Character Image URL<input id="imageUrl" type="url" maxlength="2000" placeholder="https://..." /></label>
            <label>Appearance Description<textarea id="appearanceDescription" rows="10" maxlength="3000"></textarea></label>
            <div class="actions"><button type="submit">Save</button></div>
          </form>
        </div>
      </div>
      <button id="closeBtn" class="close">Close</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
